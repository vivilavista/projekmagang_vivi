version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bukutamu-app
    container_name: bukutamu_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - bukutamu_network

  web:
    image: nginx:alpine
    container_name: bukutamu_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - bukutamu_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: bukutamu_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-buku_tamu}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-user}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - bukutamu_network

networks:
  bukutamu_network:
    driver: bridge

volumes:
  dbdata:
