<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Booking Responsiveness</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .booking-card {
            background: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-width: 620px;
            width: 100%;
            padding: 2.5rem;
        }
        .booking-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #0ea5e9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        @media (max-width: 575.98px) {
            .booking-card {
                padding: 1.5rem 1.25rem;
                border-radius: 1.25rem;
            }
            .booking-container {
                padding: 1rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="booking-container">
        <div class="booking-card">
            <div class="text-center mb-4">
                <div class="mb-3"
                    style="width:56px;height:56px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;margin:0 auto;">
                    <i class="bi bi-calendar-check text-primary" style="font-size:1.6rem;"></i>
                </div>
                <h3 class="fw-bold text-dark">Booking Kunjungan</h3>
                <p class="text-muted small">Isi formulir berikut untuk mendaftar kunjungan. Kunjungan perlu disetujui terlebih dahulu.</p>
            </div>
            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nama Lengkap <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" placeholder="Nama sesuai KTP">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">NIK <small class="text-muted">(16 digit)</small></label>
                        <input type="text" class="form-control" placeholder="3271xxxxxxxxxxxxxx">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-semibold">
                    <i class="bi bi-send me-2"></i>Daftar Kunjungan
                </button>
            </form>
        </div>
    </div>
</body>
</html>
