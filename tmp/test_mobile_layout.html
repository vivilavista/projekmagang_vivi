<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test App Layout Responsiveness</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --sidebar-width: 260px;
            --c-darkest: #000F22;
            --c-dark: #052355;
            --c-lightest: #C2E8FF;
        }
        body { background: #f0f5fb; margin: 0; overflow-x: hidden; font-family: sans-serif; }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(170deg, var(--c-darkest) 0%, var(--c-dark) 60%, #073a7a 100%);
            position: fixed; top: 0; left: 0; z-index: 1050;
            box-shadow: 4px 0 24px rgba(0, 15, 34, 0.35);
            display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (max-width: 991.98px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0 !important; }
            .sidebar-overlay {
                display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); z-index: 1040;
            }
            .sidebar-overlay.show { display: block; }
        }
        .main-content { margin-left: var(--sidebar-width); min-height: 100vh; transition: margin-left 0.3s ease; }
        .topbar { background: #fff; border-bottom: 1px solid rgba(115, 147, 188, 0.15); padding: 0.8rem 1.75rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .btn-toggle-sidebar { display: none; background: transparent; border: none; font-size: 1.4rem; }
        @media (max-width: 991.98px) { .btn-toggle-sidebar { display: block; } }
        .sidebar-brand { padding: 1.4rem 1.25rem; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand d-flex justify-content-between align-items-center">
            <span>Buku Tamu</span>
            <button class="btn btn-link link-light d-lg-none" id="closeSidebar" style="font-size: 1.5rem;"><i class="bi bi-x"></i></button>
        </div>
        <div class="p-3 text-light">Menu Mock...</div>
    </div>
    
    <div class="main-content">
        <div class="topbar">
            <div class="d-flex align-items-center">
                <button class="btn-toggle-sidebar" id="openSidebar"><i class="bi bi-list"></i></button>
                <h6 class="mb-0 ms-2">Dashboard</h6>
            </div>
            <div>Toko / User</div>
        </div>
        <div class="p-4">
            <h4>Content Area</h4>
            <p>Ini adalah demo layout responsif yang sudah diperbaiki.</p>
            <div class="card p-3">Data Mock...</div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function toggle() {
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        openBtn.onclick = toggle;
        closeBtn.onclick = toggle;
        overlay.onclick = toggle;
    </script>
</body>
</html>
